name: Publish Docker image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Track 1 contract test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python test_agent.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        shell: bash
        run: echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:amd64
            ${{ steps.image.outputs.image_name }}:t1-fixed
            ${{ steps.image.outputs.image_name }}:t1-direct
            ${{ steps.image.outputs.image_name }}:t1-response
            ${{ steps.image.outputs.image_name }}:t1-strict-response
            ${{ steps.image.outputs.image_name }}:t1-stable-baseline
            ${{ steps.image.outputs.image_name }}:t1-accuracy-v2
            ${{ steps.image.outputs.image_name }}:t1-accuracy-v3
            ${{ steps.image.outputs.image_name }}:t1-accuracy-v3-safe
            ${{ steps.image.outputs.image_name }}:t1-${{ github.sha }}
